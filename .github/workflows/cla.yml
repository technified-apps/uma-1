name: CLA Check

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  cla-check:
    name: CLA Check
    runs-on: ubuntu-latest

    steps:
      - name: Verify CLA sign-off
        uses: actions/github-script@v7
        with:
          script: |
            const requiredText = "I have read the CLA Document and I hereby sign the CLA.";
            const statusContext = "CLA Check";
            const botMarker = "<!-- aimemlabs-cla-check -->";

            const { owner, repo } = context.repo;

            let prNumber;
            let headSha;

            if (context.eventName === "pull_request_target") {
              const pr = context.payload.pull_request;
              prNumber = pr.number;
              headSha = pr.head.sha;
            } else if (context.eventName === "issue_comment") {
              const issue = context.payload.issue;

              if (!issue.pull_request) {
                core.info("Comment is not on a pull request. Skipping.");
                return;
              }

              prNumber = issue.number;

              const prResponse = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber
              });

              headSha = prResponse.data.head.sha;
            } else {
              core.setFailed(`Unsupported event: ${context.eventName}`);
              return;
            }

            const prResponse = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber
            });

            const pr = prResponse.data;
            const prAuthor = pr.user.login;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100
              }
            );

            const signed = comments.some(comment =>
              comment.user &&
              comment.user.login === prAuthor &&
              comment.body &&
              comment.body.trim() === requiredText
            );

            const existingBotComment = comments.find(comment =>
              comment.user &&
              comment.user.type === "Bot" &&
              comment.body &&
              comment.body.includes(botMarker)
            );

            if (!signed) {
              const body = `${botMarker}
            Thank you for your contribution to UMA.

            Before this pull request can be reviewed and merged, the PR author must sign the Contributor License Agreement (CLA).

            Please read the CLA document here: [CLA.md](https://github.com/${owner}/${repo}/blob/main/CLA.md)

            To sign the CLA, post this exact comment on this pull request:

            \`\`\`text
            ${requiredText}
            \`\`\`

            The CLA check will pass automatically after the PR author posts the exact comment.`;

              if (existingBotComment) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingBotComment.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body
                });
              }
            } else if (existingBotComment) {
              const body = `${botMarker}
            CLA signed by @${prAuthor}. Thank you.

            This pull request is cleared for maintainer review.`;

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingBotComment.id,
                body
              });
            }

            const state = signed ? "success" : "failure";
            const description = signed
              ? `CLA signed by PR author @${prAuthor}.`
              : `CLA sign-off missing from PR author @${prAuthor}.`;

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: headSha,
              state,
              context: statusContext,
              description
            });

            if (!signed) {
              core.setFailed(
                `CLA sign-off missing. PR author @${prAuthor} must comment exactly: ${requiredText}`
              );
            }

            core.info(description);
